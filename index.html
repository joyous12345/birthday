<!doctype html>
<html lang="en">

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <canvas id="cursor-canvas"></canvas>

    <!-- iOS audio hint -->
    <div id="audio-hint" style="display: none">
      <span id="audio-hint-txt">👆 Tap anywhere to enable music</span>
    </div>

        >💝</span

        class="bg-deco"
        style="left: 25%; top: 90%; --sz: 18px; --sd: 8s; --sdl: 0.4s"

        class="bg-deco"
        style="left: 60%; top: 15%; --sz: 16px; --sd: 7s; --sdl: 1.5s"

        <div class="s-emoji-cluster">
          <span class="se se1">🎂</span><span class="se se2">✨</span>
          <span class="se se3">🎈</span><span class="se se4">🎉</span>
          <span class="se se5">💖</span>
        </div>
        <p class="s-invite" id="s-invite">Who's celebrating today?</p>
        <div class="lang-row">
          <button class="lang-btn active" onclick="setLang('en')">
            English
          </button>
          <button class="lang-btn" onclick="setLang('zh')">中文</button>
        </div>
        <div class="name-row">
          <input
            id="name-input"
            type="text"
            maxlength="20"
            placeholder="Name (optional)"
            autocomplete="off"
          />
        </div>
        <button class="start-btn" onclick="startExp()">
          <span id="s-btn">🎉 Start Celebration!</span>
        </button>
      </div>
    </div>

    <div id="watermark">🎂 Made by Joyous ♥</div>
